<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NextDNS Medic — Screenshots</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px;
    background: linear-gradient(135deg, #0d1117 0%, #161b27 50%, #0d1117 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  .scene {
    display: flex;
    align-items: flex-start;
    gap: 40px;
  }
  /* Browser chrome mock */
  .browser-chrome {
    background: #1e2030;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.08);
    width: 440px;
  }
  .browser-bar {
    background: #272b3d;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #2a2d3e;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #28c840; }
  .url-bar {
    flex: 1;
    background: #1a1d27;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    color: #64748b;
    margin-left: 8px;
  }
  /* Popup */
  .popup {
    background: #0f1117;
    color: #e2e8f0;
    font-size: 13px;
    width: 400px;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px;
    background: #1a1d27;
    border-bottom: 1px solid #2a2d3e;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 20px; }
  .title { font-weight: 700; font-size: 14px; color: #f1f5f9; }
  .subtitle { font-size: 11px; color: #64748b; }
  .header-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: transparent; border: none; font-size: 16px;
    padding: 4px; border-radius: 6px; opacity: 0.6; cursor: pointer;
  }
  .stats-bar {
    display: flex; align-items: center; justify-content: center;
    padding: 8px 14px; background: #131620;
    border-bottom: 1px solid #2a2d3e;
  }
  .stat { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .stat-num { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }
  .stat-divider { width: 1px; height: 32px; background: #2a2d3e; }
  .high-label   { color: #f87171; }
  .medium-label { color: #fbbf24; }
  .low-label    { color: #4ade80; }
  .section-header {
    padding: 8px 14px 4px; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; align-items: center; gap: 6px;
  }
  .section-header::after { content: ""; flex: 1; height: 1px; background: currentColor; opacity: 0.2; }
  .section-header.high   { color: #f87171; }
  .section-header.medium { color: #fbbf24; }
  .section-header.low    { color: #4ade80; }
  .block-item {
    display: flex; align-items: flex-start;
    padding: 8px 14px; gap: 10px;
    border-bottom: 1px solid #1e2130;
  }
  .confidence-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .confidence-dot.HIGH   { background: #f87171; box-shadow: 0 0 6px #f87171aa; }
  .confidence-dot.MEDIUM { background: #fbbf24; box-shadow: 0 0 6px #fbbf24aa; }
  .confidence-dot.LOW    { background: #4ade80; }
  .block-info { flex: 1; min-width: 0; }
  .block-domain { font-weight: 600; font-size: 12px; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .block-label  { font-size: 11px; color: #64748b; margin-top: 1px; }
  .block-meta   { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .block-error  { font-size: 10px; color: #475569; font-family: monospace; }
  .block-count  { font-size: 10px; color: #475569; }
  .block-actions { flex-shrink: 0; }
  .allowlist-btn {
    background: #1e3a5f; border: 1px solid #2563eb44;
    border-radius: 5px; color: #60a5fa; font-size: 10px;
    font-weight: 600; padding: 4px 8px; cursor: pointer; white-space: nowrap;
  }
  .allowlist-btn.success { background: #14532d; border-color: #4ade8044; color: #4ade80; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 36px 20px; gap: 6px; }
  .empty-icon { font-size: 28px; margin-bottom: 4px; }
  .empty-title { font-weight: 600; font-size: 14px; color: #e2e8f0; }
  .empty-subtitle { font-size: 12px; color: #475569; }
  .settings-panel { padding: 14px; background: #1a1d27; border-bottom: 1px solid #2a2d3e; }
  .settings-title { font-weight: 600; font-size: 13px; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .settings-label { display: block; font-size: 11px; color: #64748b; margin-bottom: 4px; margin-top: 10px; }
  .settings-input {
    width: 100%; background: #0f1117; border: 1px solid #2a2d3e;
    border-radius: 6px; color: #e2e8f0; padding: 7px 10px;
    font-size: 12px;
  }
  .save-btn {
    margin-top: 12px; width: 100%; background: #6366f1; border: none;
    border-radius: 6px; color: white; font-size: 13px; font-weight: 600;
    padding: 8px; cursor: pointer;
  }
  /* Caption */
  .caption {
    margin-top: 20px;
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    letter-spacing: 0.02em;
  }
  .caption strong { color: rgba(255,255,255,0.8); }
</style>
</head>
<body>
<div class="scene" id="scene"></div>

</body>
</html>
