<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; }
body { width: 128px; height: 128px; overflow: hidden; background: transparent; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="128" height="128"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const S = 128;
const PAD = 16;          // 16px transparent padding per side
const ART = S - PAD * 2; // 96x96 actual artwork area
const cx = S / 2;
const cy = S / 2;

// Clear to transparent
ctx.clearRect(0, 0, S, S);

// Shield dimensions — centered within 96x96 art area
const sw = 54, sh = 64;

// Shield path (centered at cx, cy)
function shieldPath() {
  ctx.beginPath();
  ctx.moveTo(cx, cy - sh/2);
  ctx.bezierCurveTo(cx + sw/2, cy - sh/2,  cx + sw/2, cy - sh/6,  cx + sw/2, cy + sh/8);
  ctx.bezierCurveTo(cx + sw/2, cy + sh/2.2, cx, cy + sh/2, cx, cy + sh/2);
  ctx.bezierCurveTo(cx, cy + sh/2, cx - sw/2, cy + sh/2.2, cx - sw/2, cy + sh/8);
  ctx.bezierCurveTo(cx - sw/2, cy - sh/6, cx - sw/2, cy - sh/2, cx, cy - sh/2);
  ctx.closePath();
}

// Shield fill — indigo gradient
shieldPath();
const sg = ctx.createLinearGradient(cx - sw/2, cy - sh/2, cx + sw/2, cy + sh/2);
sg.addColorStop(0, '#818cf8');
sg.addColorStop(0.45, '#6366f1');
sg.addColorStop(1, '#4338ca');
ctx.fillStyle = sg;
ctx.fill();

// Subtle inner glow on shield edge
shieldPath();
ctx.strokeStyle = 'rgba(199,210,254,0.35)';
ctx.lineWidth = 2;
ctx.stroke();

// Checkmark
ctx.strokeStyle = 'rgba(255,255,255,0.95)';
ctx.lineWidth = 6;
ctx.lineCap = 'round';
ctx.lineJoin = 'round';
ctx.beginPath();
ctx.moveTo(cx - 15, cy + 2);
ctx.lineTo(cx - 4,  cy + 14);
ctx.lineTo(cx + 17, cy - 12);
ctx.stroke();

// Alert badge (top-right, within art bounds)
const bx = cx + 22, by = cy - 22, br = 11;
// Badge shadow (small, per guidelines)
ctx.save();
ctx.shadowColor = 'rgba(0,0,0,0.3)';
ctx.shadowBlur = 4;
ctx.shadowOffsetY = 2;
ctx.beginPath();
ctx.arc(bx, by, br, 0, Math.PI * 2);
ctx.fillStyle = '#ef4444';
ctx.fill();
ctx.restore();

// Badge exclamation
ctx.fillStyle = 'white';
ctx.font = 'bold 14px -apple-system, Arial, sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('!', bx, by + 1);
</script>
</body>
</html>
